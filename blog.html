<!DOCTYPE html>
<html lang="en">
<head>
<!-- Production /blog is served by the blogIndex Cloud Function (functions/blog-index-shell.html). -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blog | Code &amp; Canvas</title>
<meta name="description" content="Articles, field notes and resources from Code & Canvas — a London & Dubai digital agency." />
<meta property="og:title" content="Blog | Code & Canvas" />
<meta property="og:description" content="Articles, field notes and resources from Code & Canvas." />
<meta property="og:type" content="website" />
<link rel="canonical" href="https://code-and-canvas.web.app/blog" />
<link rel="shortcut icon" href="/images/favicon.png" type="image/x-icon" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/css/styles.css?v=20260610q" />
<link rel="stylesheet" href="/css/pages.css?v=20260610q" />
<link rel="stylesheet" href="/css/contact-form.css?v=20260428j" />
</head>
<body data-screen-label="Blog">

<div data-include="/partials/header.html"></div>
<div data-include="/partials/mobile-nav.html"></div>

<!-- PAGE HERO -->
<section class="page-hero blog-hero">
  <div class="container">
    <div class="eyebrow">Blog</div>
    <h1>Articles &amp; <span class="italic">resources.</span></h1>
    <p class="lead">Insights, deep-dives and field notes from our studio — on brand, product, engineering, and the craft of digital experience.</p>

    <div class="blog-hero-toolbar">
      <div class="blog-search-group">
        <form class="blog-search" id="blogSearchForm" onsubmit="event.preventDefault();">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          </span>
          <input id="blogSearchInput" type="search" placeholder="Search articles…" aria-label="Search articles" autocomplete="off" />
        </form>
        <button type="submit" class="btn btn-primary blog-search-btn" form="blogSearchForm">Search <span class="arrow"></span></button>
      </div>

      <select id="blogFilterSelect" class="blog-hero-select" aria-label="Filter articles by category">
        <option value="">All categories</option>
      </select>

      <select id="blogSortSelect" class="blog-hero-select" aria-label="Sort articles by date">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>
</section>

<!-- POSTS GRID -->
<section class="blog-list-section">
  <div class="container">
    <div id="cc-blog-grid" class="blog-list-grid"></div>
    <div id="cc-blog-pagination" class="pagination"></div>
  </div>
</section>

<div data-include="/partials/footer.html"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js?v=20260428j"></script>
<script src="/js/firebase-app.js?v=20260428j"></script>
<script src="/js/site-ui.js?v=20260428j"></script>
<script src="/js/blog-card-utils.js?v=20260610f"></script>
<script src="/js/blog-list.js?v=20260610g"></script>
</body>
</html>
